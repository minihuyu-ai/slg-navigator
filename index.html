<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵动仙府 · 配置表导航器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background:#0a0e17; color:#e0e0e0; min-height:100vh; }

.header { background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding:20px 30px; border-bottom:1px solid #2a2a4a; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:22px; color:#c8a2ff; letter-spacing:2px; cursor:pointer; }
.header span { font-size:13px; color:#888; margin-left:auto; }

.main { max-width:960px; margin:0 auto; padding:24px 20px; }

/* 操作按钮行 */
.op-btns { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
.op-btn { padding:10px 20px; background:#1e2235; border:1px solid #3a3a5a; border-radius:10px; color:#c0c0d0; font-size:14px; cursor:pointer; transition:all .2s; font-weight:500; }
.op-btn:hover { background:#2a2e45; border-color:#7c5cbf; color:#c8a2ff; transform:translateY(-1px); }
.op-btn.active { background:#2a2e45; border-color:#c8a2ff; color:#c8a2ff; box-shadow:0 0 12px rgba(124,92,191,0.3); }
.op-btn.red { border-color:#5a2a2a; }
.op-btn.red:hover,.op-btn.red.active { border-color:#a04040; color:#ff8080; box-shadow:0 0 12px rgba(160,64,64,0.3); }
.op-btn.yellow { border-color:#4a4a2a; }
.op-btn.yellow:hover,.op-btn.yellow.active { border-color:#a0a040; color:#ffe060; box-shadow:0 0 12px rgba(160,160,64,0.3); }
.op-btn.green { border-color:#2a4a2a; }
.op-btn.green:hover,.op-btn.green.active { border-color:#40a040; color:#80ff80; box-shadow:0 0 12px rgba(64,160,64,0.3); }
.op-btn.cyan { border-color:#2a4a5a; color:#7ab8c8; }
.op-btn.cyan:hover,.op-btn.cyan.active { border-color:#3a8a9a; color:#a0e8f0; box-shadow:0 0 12px rgba(58,138,154,0.3); }

/* 全局区域 */
.global-section { margin-bottom:24px; }
.global-toggle { display:flex; align-items:center; gap:8px; padding:10px 16px; background:#141824; border:1px solid #2a2a4a; border-radius:10px; cursor:pointer; transition:all .2s; margin-bottom:8px; }
.global-toggle:hover { border-color:#3a3a5a; }
.global-toggle .arrow { color:#888; transition:transform .2s; font-size:12px; }
.global-toggle.open .arrow { transform:rotate(90deg); }
.global-toggle .label { color:#aaa; font-size:13px; }
.global-content { display:none; padding:12px 0; }
.global-content.show { display:block; }

/* 卡片 */
.card { background:#141824; border:1px solid #2a2a4a; border-radius:12px; padding:20px; margin-bottom:16px; }
.card-title { font-size:16px; color:#c8a2ff; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.card-title .badge { font-size:11px; padding:2px 8px; border-radius:4px; }
.badge-red { background:#3a1a1a; color:#ff8080; }
.badge-yellow { background:#3a3a1a; color:#ffe060; }
.badge-green { background:#1a3a1a; color:#80ff80; }

.chain-step { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #1e2235; }
.chain-step:last-child { border-bottom:none; }
.chain-icon { min-width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; }
.chain-icon.must { background:#3a1a1a; color:#ff8080; }
.chain-icon.optional { background:#1a2a3a; color:#60a0ff; }
.chain-table { font-weight:bold; color:#e0e0e0; min-width:180px; font-size:14px; }
.chain-action { color:#aaa; font-size:13px; flex:1; }
.chain-note { color:#7c5cbf; font-size:12px; margin-top:2px; }

.concept-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; }
.concept-item { background:#1a1e2e; border:1px solid #2a2a4a; border-radius:8px; padding:14px; cursor:pointer; transition:all .2s; }
.concept-item:hover { border-color:#7c5cbf; transform:translateY(-2px); }
.concept-item .name { font-size:15px; font-weight:bold; color:#e0e0e0; }
.concept-item .bottom { font-size:12px; color:#888; margin-top:4px; }

.translate-box { display:flex; gap:12px; margin-bottom:16px; }
.translate-box input { flex:1; padding:10px 14px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; font-family:monospace; outline:none; }
.translate-box input:focus { border-color:#7c5cbf; }
.translate-result { background:#1a1e2e; border-radius:8px; padding:16px; font-size:14px; line-height:1.8; }

.summary-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.summary-item { background:#1a1e2e; border-radius:8px; padding:10px 16px; font-size:13px; }
.summary-item .num { font-size:20px; font-weight:bold; color:#c8a2ff; }
.summary-item .label { color:#888; margin-top:2px; }

.map-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #1e2235; font-size:14px; }
.map-row:last-child { border-bottom:none; }
.map-old { color:#ff8080; min-width:80px; }
.map-arrow { color:#7c5cbf; }
.map-new { color:#80ff80; min-width:80px; }

.dep-arrow { color:#7c5cbf; margin:0 4px; }

/* 搜索替换 */
.search-replace-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.search-replace-bar input { flex:1; min-width:120px; padding:10px 14px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; }
.search-replace-bar input:focus { border-color:#7c5cbf; }
.search-replace-bar button { padding:10px 20px; border:none; border-radius:8px; font-size:14px; cursor:pointer; transition:all .2s; }
.sr-btn-search { background:#3a1a5a; color:#c8a2ff; }
.sr-btn-search:hover { background:#4a2a6a; }
.sr-btn-replace { background:#1a3a1a; color:#80ff80; }
.sr-btn-replace:hover { background:#2a4a2a; }
.sr-btn-export { background:#1a2a3a; color:#60a0ff; }
.sr-btn-export:hover { background:#2a3a4a; }
.sr-result-table { width:100%; border-collapse:collapse; font-size:13px; }
.sr-result-table th { text-align:left; padding:8px 10px; background:#1a1e2e; color:#c8a2ff; border-bottom:1px solid #3a3a5a; font-weight:normal; }
.sr-result-table td { padding:6px 10px; border-bottom:1px solid #1e2235; vertical-align:top; }
.sr-result-table tr:hover td { background:#1a1e2e; }
.sr-highlight { background:#5a3a1a; color:#ffe060; padding:1px 3px; border-radius:3px; }
.sr-replace-preview { background:#1a3a1a; color:#80ff80; padding:1px 3px; border-radius:3px; }
.sr-checkbox { width:16px; height:16px; cursor:pointer; accent-color:#7c5cbf; }
.sr-stats { display:flex; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
.sr-stat { font-size:13px; color:#888; }
.sr-stat strong { color:#c8a2ff; font-size:16px; }
.sr-loading { text-align:center; padding:40px; color:#888; }
.sr-loading .spinner { display:inline-block; width:24px; height:24px; border:3px solid #3a3a5a; border-top-color:#c8a2ff; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.sr-selected-bar { display:none; position:sticky; bottom:0; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:12px; padding:12px 16px; margin-top:12px; }
.sr-selected-bar.active { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

/* FGUI查询 */
.fgui-stats { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.fgui-stat { background:#1a1e2e; border-radius:8px; padding:10px 16px; font-size:13px; }
.fgui-stat .num { font-size:20px; font-weight:bold; color:#a0e8f0; }
.fgui-stat .label { color:#888; margin-top:2px; }
.fgui-search-bar { display:flex; gap:8px; margin-bottom:16px; }
.fgui-search-bar input { flex:1; padding:10px 14px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; }
.fgui-search-bar input:focus { border-color:#3a8a9a; }
.fgui-search-bar button { padding:10px 20px; background:#1a3a4a; border:none; border-radius:8px; color:#a0e8f0; font-size:14px; cursor:pointer; transition:all .2s; }
.fgui-search-bar button:hover { background:#2a4a5a; }
.fgui-result-card { background:#1a1e2e; border:1px solid #2a3a4a; border-radius:8px; padding:14px; margin-bottom:8px; cursor:pointer; transition:all .2s; }
.fgui-result-card:hover { border-color:#3a8a9a; transform:translateY(-1px); }
.fgui-result-card .fgui-id { font-size:14px; font-weight:bold; color:#a0e8f0; }
.fgui-result-card .fgui-name { font-size:13px; color:#e0e0e0; margin-left:8px; }
.fgui-result-card .fgui-pkg { font-size:12px; color:#888; margin-top:4px; }
.fgui-detail { background:#141824; border:1px solid #2a3a4a; border-radius:12px; padding:20px; margin-bottom:16px; }
.fgui-ref-list { list-style:none; padding:0; }
.fgui-ref-list li { padding:6px 10px; border-bottom:1px solid #1e2235; font-size:13px; display:flex; align-items:center; gap:8px; }
.fgui-ref-list li:last-child { border-bottom:none; }
.fgui-ref-id { color:#a0e8f0; cursor:pointer; text-decoration:underline; }
.fgui-ref-id:hover { color:#c0f0ff; }
.fgui-ref-pkg { color:#888; font-size:12px; }
.fgui-ref-type { color:#666; font-size:11px; background:#1e2235; padding:2px 6px; border-radius:3px; }
.fgui-loading { text-align:center; padding:40px; color:#888; }
.fgui-loading .spinner { display:inline-block; width:24px; height:24px; border:3px solid #2a4a5a; border-top-color:#a0e8f0; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:12px; }
.fgui-back-btn { padding:6px 14px; background:#1e2235; border:1px solid #3a3a5a; border-radius:8px; color:#888; font-size:13px; cursor:pointer; transition:all .2s; margin-bottom:12px; }
.fgui-back-btn:hover { border-color:#3a8a9a; color:#a0e8f0; }

/* 操作详情页标题 */
.op-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #2a2a4a; }
.op-header h2 { font-size:20px; color:#e0e0e0; }
.op-header .back-btn { padding:6px 14px; background:#1e2235; border:1px solid #3a3a5a; border-radius:8px; color:#888; font-size:13px; cursor:pointer; transition:all .2s; }
.op-header .back-btn:hover { border-color:#7c5cbf; color:#c8a2ff; }
.op-header .desc { color:#888; font-size:13px; }

/* 依赖查询内联 */
.dep-inline-select { width:100%; padding:10px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; margin-bottom:12px; }

/* 区域分隔标签 */
.section-label { font-size:13px; color:#666; padding:8px 0 4px; text-transform:uppercase; letter-spacing:2px; border-bottom:1px solid #1e2235; margin-bottom:12px; margin-top:8px; }

/* 概念对照卡片内嵌 */
.concept-map-card { background:#1a1e2e; border:1px solid #2a2a4a; border-radius:8px; padding:12px; margin-bottom:8px; }
.concept-map-card .cm-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.concept-map-card .cm-name { font-size:15px; font-weight:bold; color:#e0e0e0; }
.concept-map-card .cm-mapping { font-size:13px; color:#888; }
.concept-map-card .cm-tables { font-size:12px; color:#666; margin-top:4px; }

@media(max-width:600px) {
  .header h1 { font-size:18px; }
  .main { padding:16px 12px; }
  .op-btns { gap:6px; }
  .op-btn { padding:8px 14px; font-size:13px; }
  .chain-step { flex-wrap:wrap; }
  .chain-table { min-width:auto; }
  .search-replace-bar { flex-direction:column; }
  .sr-result-table { font-size:11px; }
}
</style>
</head>
<body>

<div class="header">
  <h1 onclick="goHome()">🔮 灵动仙府 · 配置表导航器</h1>
  <span>v2.2 · 策划端适配器</span>
</div>

<div class="main">
  <!-- 操作按钮行 -->
  <div class="op-btns" id="opBtns"></div>

  <!-- 全局区域（概念映射 + 资源翻译，默认折叠） -->
  <div class="global-section">
    <div class="global-toggle" onclick="toggleGlobal('concept')">
      <span class="arrow" id="conceptArrow">▶</span>
      <span class="label">📋 概念映射 — 修仙术语 ↔ 底层表对照（全局）</span>
    </div>
    <div class="global-content" id="conceptContent"></div>
  </div>

  <div class="global-section">
    <div class="global-toggle" onclick="toggleGlobal('translate')">
      <span class="arrow" id="translateArrow">▶</span>
      <span class="label">🔤 资源翻译 — 配置表数字 → 修仙术语（全局）</span>
    </div>
    <div class="global-content" id="translateContent"></div>
  </div>

  <!-- 主内容区 -->
  <div id="mainContent">
    <div style="text-align:center;padding:60px 20px;color:#666;">
      <div style="font-size:48px;margin-bottom:16px;">🎯</div>
      <p style="font-size:14px;line-height:1.8;">点击上方操作按钮，开始你需要的操作<br>每个操作会展示相关的指引、对照表、依赖和搜索工具</p>
    </div>
  </div>
</div>

function initOpBtns() {

    {label:'活动', op:'活动', cls:'yellow'},
    {label:'查FGUI', op:'查FGUI', cls:'cyan'},
  ];
  var container = $('opBtns');
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    var btn = document.createElement('button');
    btn.className = 'op-btn ' + b.cls;
    btn.textContent = b.label;

function setActiveBtn(op) {
  var btns = document.querySelectorAll('.op-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-op') === op);
  }
}

function toggleGlobal(name) {
  var content = $(name + 'Content');
  var arrow = $(name + 'Arrow');
  var toggle = content.previousElementSibling;
  if (content.classList.contains('show')) {
    content.classList.remove('show');
    toggle.classList.remove('open');
  } else {
    if (!content.innerHTML) {
      if (name === 'concept') renderConceptGlobal(content);
      if (name === 'translate') renderTranslateGlobal(content);
    }
    content.classList.add('show');
    toggle.classList.add('open');
  }
}

function doTranslate() {
  var val = $('translateInput').value.trim();
  if (!val) { $('translateResult').innerHTML = '<span style="color:#888;">在上方输入框粘贴配置表中的引用值</span>'; return; }
  var results = [];
  var parts = val.split('|');
  for (var pi = 0; pi < parts.length; pi++) {
    var p = parts[pi].trim().split(';');
    if (p.length < 3) { results.push('<span style="color:#ff8080;">❌ "' + parts[pi] + '" 格式不符(需3段;分隔)</span>'); continue; }
    var typeId = p[0].trim(), amount = p[2].trim();
    var resInfo = DATA.resourceMap[typeId];
    if (resInfo) {
      results.push('<span style="color:#80ff80;">✅ ' + amount + '<strong>' + resInfo.xiu + '</strong></span> <span style="color:#666;">(底层: ' + amount + resInfo.old + ', ID=' + typeId + ')</span>');
    } else if (parseInt(typeId) > 6) {
      results.push('<span style="color:#ffe060;">⚠️ 类型ID=' + typeId + ' 不在资源表中，可能是道具ID，需查props表确认</span> <span style="color:#666;">数量=' + amount + '</span>');
    } else {
      results.push('<span style="color:#ff8080;">❓ 类型ID=' + typeId + ' 未识别</span> <span style="color:#666;">数量=' + amount + '</span>');
    }
  }
  $('translateResult').innerHTML = results.join('<br>');
}

function showOp(op) {
  currentOp = op;
  setActiveBtn(op);
  var opInfo = DATA.operations[op];
  if (!opInfo) return;

  var html = '';

  // 标题
  html += '<div class="op-header">';
  html += '<button class="back-btn" onclick="goHome()">← 返回</button>';
  html += '<h2>' + op + '</h2>';
  html += '<span class="desc">' + opInfo.desc + '</span>';
  html += '</div>';

  // === 对照表（优先级第一） ===
  if (opInfo.relatedMap && opInfo.relatedMap.length > 0) {
    html += '<div class="section-label">📊 对照表</div>';
    for (var mi = 0; mi < opInfo.relatedMap.length; mi++) {
      var conceptName = opInfo.relatedMap[mi];
      var conceptInfo = DATA.conceptMap[conceptName];
      if (!conceptInfo) continue;

      // 概念对照卡片
      html += '<div class="card">';
      html += '<div class="card-title">' + conceptName + ' ' + statusBadge(conceptInfo.status) + '</div>';
      html += '<div style="color:#aaa;font-size:13px;margin-bottom:12px;">' + conceptInfo.desc + '</div>';
      html += '<div class="concept-map-card">';
      html += '<div class="cm-head"><span class="cm-name">' + conceptInfo.bottomConcept + '</span><span class="cm-mapping">→ ' + conceptName + '</span></div>';
      html += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;margin-top:6px;">';
      html += '<span style="color:#888;">主表: <strong style="color:#e0e0e0;">' + conceptInfo.bottomTable + '</strong></span>';
      html += '<span style="color:#888;">ID字段: <strong style="color:#e0e0e0;">' + conceptInfo.idField + '</strong></span>';
      html += '<span style="color:#888;">关联: <strong style="color:#e0e0e0;">' + conceptInfo.links.length + '张表</strong></span>';
      html += '</div>';
      html += '<div class="cm-tables" style="margin-top:8px;">关联表: ' + conceptInfo.links.join(', ') + '</div>';
      html += '</div>';
      html += '</div>';

      // 建筑概念 → 展示建筑名对照
      if (conceptName === '建筑') {
        html += '<div class="card"><div class="card-title">🏠 建筑名对照</div>';
        html += '<div class="map-row"><span class="map-old" style="font-weight:bold;">底层名</span><span class="map-arrow"></span><span class="map-new" style="font-weight:bold;">修仙名</span></div>';
        for (var old in DATA.buildingMap) {
          html += '<div class="map-row"><span class="map-old">' + old + '</span><span class="map-arrow">→</span><span class="map-new">' + DATA.buildingMap[old] + '</span></div>';
        }
        html += '</div>';
      }

      // 道具概念 → 展示资源ID对照
      if (conceptName === '道具') {
        html += '<div class="card"><div class="card-title">💎 资源ID对照</div>';
        html += '<div class="map-row"><span class="map-old" style="font-weight:bold;">ID</span><span class="map-arrow"></span><span class="map-new" style="font-weight:bold;">修仙名(底层名)</span></div>';
        for (var id in DATA.resourceMap) {
          var m = DATA.resourceMap[id];
          html += '<div class="map-row"><span class="map-old">' + id + '</span><span class="map-arrow">→</span><span class="map-new">' + m.xiu + '(' + m.old + ')</span></div>';
        }
        html += '</div>';
      }
    }
  }

  // === 操作指引（有步骤的操作才显示） ===
  if (opInfo.steps && opInfo.steps.length > 0) {
    var mustSteps = [], optSteps = [];
    for (var i = 0; i < opInfo.steps.length; i++) {
      if (opInfo.steps[i].must) mustSteps.push(opInfo.steps[i]);
      else optSteps.push(opInfo.steps[i]);
    }

    html += '<div class="section-label">📋 操作指引</div>';
    if (mustSteps.length > 0) {
      html += '<div class="card"><div class="card-title">🔴 必改表（不填就跑不通）</div>';
      for (var i = 0; i < mustSteps.length; i++) {
        var s = mustSteps[i];
        html += '<div class="chain-step"><div class="chain-icon must">' + (i+1) + '</div>';
        html += '<div class="chain-table">' + s.table + '</div>';
        html += '<div class="chain-action">' + s.action + (s.note ? '<div class="chain-note">💡 ' + s.note + '</div>' : '') + '</div></div>';
      }
      html += '</div>';
    }
    if (optSteps.length > 0) {
      html += '<div class="card"><div class="card-title">⚪ 选改表（按需配置）</div>';
      for (var i = 0; i < optSteps.length; i++) {
        var s = optSteps[i];
        html += '<div class="chain-step"><div class="chain-icon optional">' + (i+1) + '</div>';
        html += '<div class="chain-table">' + s.table + '</div>';
        html += '<div class="chain-action">' + s.action + (s.note ? '<div class="chain-note">💡 ' + s.note + '</div>' : '') + '</div></div>';
      }
      html += '</div>';
    }
  }

  // === 依赖查询（操作涉及的表的反向依赖） ===
  if (opInfo.steps && opInfo.steps.length > 0) {
    html += '<div class="section-label">🔗 依赖查询</div>';
    var opTables = [];
    for (var i = 0; i < opInfo.steps.length; i++) {
      var t = opInfo.steps[i].table.replace('*','');
      if (opTables.indexOf(t) === -1) opTables.push(t);
    }
    html += '<div class="card">';
    html += '<div class="card-title">本操作涉及的表</div>';
    html += '<div style="color:#aaa;font-size:13px;margin-bottom:12px;">选择一张表，查看谁在引用它（改这张表会影响谁）</div>';
    html += '<select class="dep-inline-select" onchange="showOpDeps(this.value)"><option value="">-- 选择表名 --</option>';
    for (var i = 0; i < opTables.length; i++) {
      html += '<option value="' + opTables[i] + '">' + opTables[i] + ' (' + (TABLE_CN[opTables[i]]||'') + ')</option>';
    }
    html += '</select>';
    html += '<div id="opDepResult"></div>';
    html += '</div>';
  }

  // === 改名速查（操作相关类别） ===
  if (opInfo.relatedRename !== undefined) {
    var cats = DATA.renameGuide.categories;
    var showCats = opInfo.relatedRename;
    html += '<div class="section-label">✏️ 改名速查</div>';
    html += '<div style="color:#aaa;font-size:13px;margin-bottom:12px;">改这个领域的名字，需要翻哪些表的哪些字段</div>';
    for (var catName in cats) {
      if (showCats && showCats.indexOf(catName) === -1) continue;
      var catInfo = cats[catName];
      var mustCount = 0;
      for (var j = 0; j < catInfo.tables.length; j++) {
        if (catInfo.tables[j].priority.indexOf('必改') !== -1) mustCount++;
      }
      html += '<div class="card"><div class="card-title">' + catName + ' <span style="font-size:12px;color:#888;">' + mustCount + '个必改 · ' + catInfo.tables.length + '个表</span></div>';
      for (var j = 0; j < catInfo.tables.length; j++) {
        var t = catInfo.tables[j];
        var isMust = t.priority.indexOf('必改') !== -1;
        html += '<div class="chain-step">';
        html += '<div class="chain-icon ' + (isMust?'must':'optional') + '">' + (isMust?'必':'选') + '</div>';
        html += '<div class="chain-table">' + t.table + (t.sheet && t.sheet !== 'Sheet1' ? ' [' + t.sheet + ']' : '') + '</div>';
        html += '<div class="chain-action"><div>' + t.desc + '</div><div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;">';
        for (var k = 0; k < t.fields.length; k++) {
          html += '<span style="background:#1e2235;padding:2px 8px;border-radius:4px;font-size:12px;color:#c8a2ff;">' + t.fields[k] + '</span>';
        }
        html += '</div></div></div>';
      }
      html += '</div>';
    }
  }

  // === 搜索替换（文案专属） ===
  if (opInfo.hasSearchReplace) {
    html += '<div class="section-label">🔍 全局文案搜索替换</div>';
    html += renderSearchReplaceHTML();
  }

  // === FGUI资源查询 ===
  if (opInfo.hasFgui) {
    html += renderFguiHTML();
  }

  $('mainContent').innerHTML = html;
}

function showOpDeps(tableName) {
  var el = $('opDepResult');
  if (!tableName) { el.innerHTML = ''; return; }
  var referencedBy = [], opRefs = [];
  for (var concept in DATA.conceptMap) {
    var info = DATA.conceptMap[concept];
    if (info.bottomTable === tableName || info.links.indexOf(tableName) !== -1) {
      referencedBy.push({concept:concept, table:info.bottomTable, isCore: info.bottomTable === tableName});
    }
  }
  for (var opName in DATA.operations) {
    var opInfo = DATA.operations[opName];
    if (!opInfo.steps) continue;
    for (var i = 0; i < opInfo.steps.length; i++) {
      var s = opInfo.steps[i];
      if (s.table === tableName || s.table.replace('*','') === tableName) {
        opRefs.push({op:opName, action:s.action, must:s.must});
      }
    }
  }
  var html = '';
  if (referencedBy.length > 0) {
    html += '<div style="margin-top:8px;color:#aaa;font-size:13px;">📌 被以下概念引用：</div>';
    for (var i = 0; i < referencedBy.length; i++) {
      var ref = referencedBy[i];
      html += '<div class="chain-step"><div class="chain-icon ' + (ref.isCore?'must':'optional') + '">' + (ref.isCore?'★':'→') + '</div>';
      html += '<div class="chain-table">' + ref.concept + '</div>';
      html += '<div class="chain-action">底层表: ' + ref.table + ' ' + (ref.isCore?'🔴核心表':'⚪关联表') + '</div></div>';
    }
  }
  if (opRefs.length > 0) {
    html += '<div style="margin-top:8px;color:#aaa;font-size:13px;">⚠️ 出现在以下操作中：</div>';
    for (var i = 0; i < opRefs.length; i++) {
      var ref = opRefs[i];
      html += '<div class="chain-step"><div class="chain-icon ' + (ref.must?'must':'optional') + '">' + (ref.must?'必':'选') + '</div>';
      html += '<div class="chain-table">' + ref.op + '</div>';
      html += '<div class="chain-action">' + ref.action + '</div></div>';
    }
  }
  if (!referencedBy.length && !opRefs.length) {
    html = '<div style="color:#666;padding:12px;">该表暂未被记录在映射关系中</div>';
  }
  el.innerHTML = html;
}

function loadTextData(callback) {
  if (textData) { callback(); return; }
  var srArea = $('srResultArea');
  if (srArea) { srArea.innerHTML = '<div class="sr-loading"><div class="spinner"></div><br>正在加载文本索引(约1.1MB)...</div>'; }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'text_search_data.json', true);
  xhr.timeout = 30000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try { textData = JSON.parse(xhr.responseText); } catch(e) { textData = {}; alert('文本索引解析失败，请刷新页面重试'); return; }
    } else {
      textData = {};
      if (srArea) { srArea.innerHTML = '<div style="text-align:center;color:#ff8080;padding:40px;">❌ 文本索引加载失败(HTTP ' + xhr.status + ')，请刷新页面重试</div>'; }
      return;
    }
    callback();
  };
  xhr.onerror = function() {
    textData = {};
    if (srArea) { srArea.innerHTML = '<div style="text-align:center;color:#ff8080;padding:40px;">❌ 网络错误，文本索引加载失败，请刷新页面重试</div>'; }
  };
  xhr.ontimeout = function() {
    if (srArea) { srArea.innerHTML = '<div style="text-align:center;color:#ff8080;padding:40px;">❌ 加载超时(30秒)，请检查网络后刷新重试</div>'; }
  };
  xhr.send();
}

function doSearch() {
  var keyword = $('srKeyword').value.trim();
  if (!keyword) return;
  loadTextData(function() {
    srResults = [];
    srSelected = {};
    for (var table in textData) {
      var entries = textData[table];
      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i];
        for (var field in entry.f) {
          var val = entry.f[field];
          if (val.indexOf(keyword) !== -1) {
            srResults.push({table:table, id:entry.i, row:entry.r, sheet:entry.s, field:field, original:val});
          }
        }
      }
    }
    var tableGroups = {};
    for (var i = 0; i < srResults.length; i++) {
      var t = srResults[i].table;
      if (!tableGroups[t]) tableGroups[t] = 0;
      tableGroups[t]++;
    }
    var html = '<div class="card"><div class="sr-stats">';
    html += '<div class="sr-stat">找到 <strong>' + srResults.length + '</strong> 处匹配</div>';
    html += '<div class="sr-stat">涉及 <strong>' + Object.keys(tableGroups).length + '</strong> 张表</div>';
    var tableList = [];
    for (var t in tableGroups) { tableList.push((TABLE_CN[t]||t) + '(' + tableGroups[t] + ')'); }
    html += '<div class="sr-stat" style="flex-basis:100%;">分布: ' + tableList.join('、') + '</div>';
    html += '</div></div>';

    html += '<div class="card" style="overflow-x:auto;"><table class="sr-result-table">';
    html += '<tr><th><input type="checkbox" class="sr-checkbox" onchange="toggleAll(this.checked)"></th><th>表</th><th>ID</th><th>字段</th><th>原文</th></tr>';
    for (var i = 0; i < srResults.length; i++) {
      var r = srResults[i];
      var key = r.table + '|' + r.id + '|' + r.field;
      srSelected[key] = true;
      var highlighted = escapeHtml(r.original);
      var kwEsc = escapeHtml(keyword);
      var regex = new RegExp('(' + kwEsc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      highlighted = highlighted.replace(regex, '<span class="sr-highlight">$1</span>');
      html += '<tr>';
      html += '<td><input type="checkbox" class="sr-checkbox" data-key="' + key + '" checked onchange="toggleItem(\'' + key + '\',this.checked)"></td>';
      html += '<td style="white-space:nowrap;"><strong>' + (TABLE_CN[r.table]||r.table) + '</strong><br><span style="color:#666;font-size:11px;">' + r.table + '.xlsx</span></td>';
      html += '<td>' + escapeHtml(r.id) + '</td>';
      html += '<td style="color:#c8a2ff;">' + escapeHtml(r.field) + '</td>';
      html += '<td style="max-width:400px;word-break:break-all;">' + highlighted + '</td>';
      html += '</tr>';
    }
    html += '</table></div>';
    $('srResultArea').innerHTML = html;
    updateSelCount();
  });
}

function toggleAll(checked) {
  for (var key in srSelected) srSelected[key] = checked;
  var cbs = document.querySelectorAll('.sr-checkbox[data-key]');
  for (var i = 0; i < cbs.length; i++) cbs[i].checked = checked;
  updateSelCount();
}

function toggleItem(key, checked) { srSelected[key] = checked; updateSelCount(); }

function updateSelCount() {
  var count = 0;
  for (var key in srSelected) { if (srSelected[key]) count++; }
  var el = $('srSelCount');
  if (el) el.textContent = count;
  var bar = $('srSelectedBar');
  if (bar) bar.className = 'sr-selected-bar' + (count > 0 ? ' active' : '');
}

function doReplacePreview() {
  srReplaceText = $('srReplace') ? $('srReplace').value.trim() : '';
  if (!srReplaceText) { alert('请先输入替换文本'); return; }
  var keyword = $('srKeyword') ? $('srKeyword').value.trim() : '';
  if (!keyword) return;
  var selectedResults = [];
  for (var i = 0; i < srResults.length; i++) {
    var r = srResults[i];
    var key = r.table + '|' + r.id + '|' + r.field;
    if (srSelected[key]) selectedResults.push(r);
  }
  if (selectedResults.length === 0) { alert('请至少勾选一项'); return; }
  var html = '<div class="card"><div class="card-title">👁 替换预览</div>';
  html += '<div class="sr-stats"><div class="sr-stat">将 <strong>"' + escapeHtml(keyword) + '"</strong> 替换为 <strong>"' + escapeHtml(srReplaceText) + '"</strong></div>';
  html += '<div class="sr-stat">共 <strong>' + selectedResults.length + '</strong> 处</div></div></div>';
  html += '<div class="card" style="overflow-x:auto;"><table class="sr-result-table">';
  html += '<tr><th>表</th><th>ID</th><th>字段</th><th>原文 → 替换后</th></tr>';
  for (var i = 0; i < selectedResults.length; i++) {
    var r = selectedResults[i];
    var newVal = r.original.split(keyword).join(srReplaceText);
    html += '<tr><td style="white-space:nowrap;"><strong>' + (TABLE_CN[r.table]||r.table) + '</strong></td>';
    html += '<td>' + escapeHtml(r.id) + '</td>';
    html += '<td style="color:#c8a2ff;">' + escapeHtml(r.field) + '</td>';
    html += '<td style="max-width:500px;word-break:break-all;">';
    html += '<span class="sr-highlight">' + escapeHtml(keyword) + '</span> → <span class="sr-replace-preview">' + escapeHtml(srReplaceText) + '</span>';
    html += '<br><span style="color:#666;font-size:12px;">替换后: ' + escapeHtml(newVal) + '</span></td></tr>';
  }
  html += '</table></div>';
  $('srResultArea').innerHTML = html;
}

function exportReplacePlan() {
  srReplaceText = $('srReplace') ? $('srReplace').value.trim() : '';
  var keyword = $('srKeyword') ? $('srKeyword').value.trim() : '';
  if (!keyword) { alert('请先搜索关键词'); return; }
  if (!srReplaceText) { alert('请先输入替换文本'); return; }
  var selectedResults = [];
  for (var i = 0; i < srResults.length; i++) {
    var r = srResults[i];
    var key = r.table + '|' + r.id + '|' + r.field;
    if (srSelected[key]) selectedResults.push(r);
  }
  if (selectedResults.length === 0) { alert('请至少勾选一项'); return; }
  var lines = [];
  lines.push('# 文案替换方案');
  lines.push('生成时间: ' + new Date().toLocaleString());
  lines.push('');
  lines.push('## 替换规则');
  lines.push('关键词: "' + keyword + '"');
  lines.push('替换为: "' + srReplaceText + '"');
  lines.push('');
  lines.push('## 涉及的表和字段');
  var groups = {};
  for (var i = 0; i < selectedResults.length; i++) {
    var r = selectedResults[i];
    if (!groups[r.table]) groups[r.table] = [];
    groups[r.table].push(r);
  }
  for (var table in groups) {
    lines.push('');
    lines.push('### ' + table + '.xlsx (' + (TABLE_CN[table]||'') + ')');
    lines.push('');
    var items = groups[table];
    for (var i = 0; i < items.length; i++) {
      var r = items[i];
      var newVal = r.original.split(keyword).join(srReplaceText);
      lines.push('| ID=' + r.id + ' | 行=' + r.row + ' | Sheet=' + r.sheet + ' | 字段=' + r.field + ' |');
      lines.push('| 原文: ' + r.original + ' |');
      lines.push('| 替换: ' + newVal + ' |');
      lines.push('');
    }
  }
  lines.push('---');
  lines.push('共 ' + selectedResults.length + ' 处替换，涉及 ' + Object.keys(groups).length + ' 张表');
  lines.push('');
  lines.push('## 操作步骤');
  lines.push('1. 在SVN中checkout对应的xlsx文件');
  lines.push('2. 按上述方案逐项修改');
  lines.push('3. 修改完成后commit到SVN');
  lines.push('4. 通知程序打表验证');
  var text = lines.join('\n');
  var blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '替换方案_' + keyword + '_→_' + srReplaceText + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

  html += '</div>';
  html += '<div id="fguiResultArea">';
  html += '<div style="text-align:center;padding:40px 20px;color:#666;">';
  html += '<div style="font-size:36px;margin-bottom:12px;">🧩</div>';
  html += '<p style="font-size:13px;">输入FGUI资源ID、组件名或包名进行查询<br>点击搜索结果中的ID可追踪引用链</p>';
  html += '</div></div>';
  return html;
}

function fguiLoadData(callback) {
  if (fguiComponents && fguiRefByTarget && fguiRefBySource && fguiPkgImages) { callback(); return; }
  var area = $('fguiResultArea');
  if (area) { area.innerHTML = '<div class="fgui-loading"><div class="spinner"></div><br>正在加载FGUI索引数据(约1.5MB)...</div>'; }
  var loaded = 0;
  var needed = 0;
  if (!fguiComponents) needed++;
  if (!fguiRefByTarget) needed++;
  if (!fguiRefBySource) needed++;
  if (!fguiPkgImages) needed++;

  function check() {
    loaded++;
    if (loaded >= needed) callback();
  }

  if (!fguiComponents) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'fgui/fgui_components.json', true);
    xhr.timeout = 30000;
    xhr.onload = function() { if (xhr.status === 200) { try { fguiComponents = JSON.parse(xhr.responseText); } catch(e) { fguiComponents = {}; } } else { fguiComponents = {}; } check(); };
    xhr.onerror = function() { fguiComponents = {}; check(); };
    xhr.ontimeout = function() { fguiComponents = {}; check(); };
    xhr.send();
  }
  if (!fguiRefByTarget) {
    var xhr2 = new XMLHttpRequest();
    xhr2.open('GET', 'fgui/fgui_refby_target.json', true);
    xhr2.timeout = 30000;
    xhr2.onload = function() { if (xhr2.status === 200) { try { fguiRefByTarget = JSON.parse(xhr2.responseText); } catch(e) { fguiRefByTarget = {}; } } else { fguiRefByTarget = {}; } check(); };
    xhr2.onerror = function() { fguiRefByTarget = {}; check(); };
    xhr2.ontimeout = function() { fguiRefByTarget = {}; check(); };
    xhr2.send();
  }
  if (!fguiRefBySource) {
    var xhr3 = new XMLHttpRequest();
    xhr3.open('GET', 'fgui/fgui_refby_source.json', true);
    xhr3.timeout = 30000;
    xhr3.onload = function() { if (xhr3.status === 200) { try { fguiRefBySource = JSON.parse(xhr3.responseText); } catch(e) { fguiRefBySource = {}; } } else { fguiRefBySource = {}; } check(); };
    xhr3.onerror = function() { fguiRefBySource = {}; check(); };
    xhr3.ontimeout = function() { fguiRefBySource = {}; check(); };
    xhr3.send();
  }
  if (!fguiPkgImages) {
    var xhr4 = new XMLHttpRequest();
    xhr4.open('GET', 'fgui/fgui_pkg_images.json', true);
    xhr4.timeout = 30000;
    xhr4.onload = function() { if (xhr4.status === 200) { try { fguiPkgImages = JSON.parse(xhr4.responseText); } catch(e) { fguiPkgImages = {}; } } else { fguiPkgImages = {}; } check(); };
    xhr4.onerror = function() { fguiPkgImages = {}; check(); };
    xhr4.ontimeout = function() { fguiPkgImages = {}; check(); };
    xhr4.send();
  }
}

function fguiSearch() {
  var keyword = $('fguiKeyword').value.trim();
  if (!keyword) return;
  fguiLoadData(function() {
    var results = [];
    var kw = keyword.toLowerCase();

    // 搜索资源ID和名称
    for (var id in fguiComponents) {
      var comp = fguiComponents[id];
      if (id.toLowerCase().indexOf(kw) !== -1 || comp.n.toLowerCase().indexOf(kw) !== -1 || comp.p.toLowerCase().indexOf(kw) !== -1) {
        var refByMe = fguiRefBySource[id] || [];
        var refToMe = fguiRefByTarget[id] || [];
        results.push({ id: id, name: comp.n, pkg: comp.p, exported: comp.e, refByMe: refByMe.length, refToMe: refToMe.length });
      }
      if (results.length >= 50) break;
    }

    // 搜索包名（如果没有在组件中匹配到足够的）
    if (results.length < 5 && fguiPkgImages) {
      var pkgResults = {};
      for (var id in fguiComponents) {
        var comp = fguiComponents[id];
        if (comp.p.toLowerCase().indexOf(kw) !== -1) {
          if (!pkgResults[comp.p]) pkgResults[comp.p] = { pkg: comp.p, count: 0, images: fguiPkgImages[comp.p] || 0 };
          pkgResults[comp.p].count++;
        }
      }
      if (Object.keys(pkgResults).length > 0) {
        var pkgHtml = '<div class="card"><div class="card-title" style="color:#a0e8f0;">📦 包匹配</div>';
        for (var pkgName in pkgResults) {
          var pi = pkgResults[pkgName];
          pkgHtml += '<div class="fgui-result-card" onclick="fguiSearchPkg(\'' + pkgName + '\')">';
          pkgHtml += '<span class="fgui-name">' + pkgName + '</span>';
          pkgHtml += '<span style="color:#888;font-size:12px;margin-left:12px;">' + pi.count + '个组件 · ' + pi.images + '张图片</span>';
          pkgHtml += '</div>';
        }
        pkgHtml += '</div>';
        var area = $('fguiResultArea');
        if (area) area.innerHTML = pkgHtml;
        return;
      }
    }

    var html = '';
    html += '<div class="card"><div class="card-title" style="color:#a0e8f0;">🔍 搜索结果</div>';
    html += '<div style="color:#aaa;font-size:13px;margin-bottom:12px;">找到 <strong style="color:#a0e8f0;">' + results.length + '</strong> 个匹配资源' + (results.length >= 50 ? '（仅显示前50个）' : '') + '</div></div>';

    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      html += '<div class="fgui-result-card" onclick="fguiShowDetail(\'' + r.id + '\')">';
      html += '<span class="fgui-id">' + escapeHtml(r.id) + '</span>';
      html += '<span class="fgui-name">' + escapeHtml(r.name) + '</span>';
      if (r.exported) html += '<span style="color:#ffe060;font-size:11px;margin-left:6px;">⚡导出</span>';
      html += '<div class="fgui-pkg">📦 ' + escapeHtml(r.pkg) + ' · 引用了 ' + r.refByMe + ' 个 · 被引用 ' + r.refToMe + ' 次</div>';
      html += '</div>';
    }

    if (results.length === 0) {
      html += '<div style="text-align:center;padding:30px;color:#666;">未找到匹配的FGUI资源</div>';
    }

    var area = $('fguiResultArea');
    if (area) area.innerHTML = html;
  });
}

function fguiSearchPkg(pkgName) {
  fguiLoadData(function() {
    var results = [];
    for (var id in fguiComponents) {
      var comp = fguiComponents[id];
      if (comp.p === pkgName) {
        var refByMe = fguiRefBySource[id] || [];
        var refToMe = fguiRefByTarget[id] || [];
        results.push({ id: id, name: comp.n, pkg: comp.p, exported: comp.e, refByMe: refByMe.length, refToMe: refToMe.length });
      }
    }

    var imgCount = fguiPkgImages ? (fguiPkgImages[pkgName] || 0) : 0;
    var html = '';
    html += '<button class="fgui-back-btn" onclick="fguiSearch()">← 返回搜索</button>';
    html += '<div class="card"><div class="card-title" style="color:#a0e8f0;">📦 ' + escapeHtml(pkgName) + '</div>';
    html += '<div style="color:#aaa;font-size:13px;">' + results.length + '个组件 · ' + imgCount + '张图片</div></div>';

    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      html += '<div class="fgui-result-card" onclick="fguiShowDetail(\'' + r.id + '\')">';
      html += '<span class="fgui-id">' + escapeHtml(r.id) + '</span>';
      html += '<span class="fgui-name">' + escapeHtml(r.name) + '</span>';
      if (r.exported) html += '<span style="color:#ffe060;font-size:11px;margin-left:6px;">⚡导出</span>';
      html += '<div class="fgui-pkg">引用了 ' + r.refByMe + ' 个 · 被引用 ' + r.refToMe + ' 次</div>';
      html += '</div>';
    }

    var area = $('fguiResultArea');
    if (area) area.innerHTML = html;
  });
}

function fguiShowDetail(resId) {
  fguiLoadData(function() {
    var comp = fguiComponents[resId];
    if (!comp) {
      var area = $('fguiResultArea');
      if (area) area.innerHTML = '<div style="text-align:center;padding:30px;color:#ff8080;">未找到资源: ' + escapeHtml(resId) + '</div>';
      return;
    }

    var refsFrom = fguiRefBySource[resId] || [];
    var refsTo = fguiRefByTarget[resId] || [];

    var html = '';
    html += '<button class="fgui-back-btn" onclick="fguiSearch()">← 返回搜索</button>';
    html += '<div class="fgui-detail">';
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">';
    html += '<div style="font-size:22px;font-weight:bold;color:#a0e8f0;">' + escapeHtml(resId) + '</div>';
    html += '<div style="font-size:16px;color:#e0e0e0;">' + escapeHtml(comp.n) + '</div>';
    if (comp.e) html += '<span style="color:#ffe060;font-size:12px;background:#3a3a1a;padding:2px 8px;border-radius:4px;">⚡导出资源</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#888;margin-bottom:16px;">';
    html += '<span>📦 包: <strong style="color:#e0e0e0;">' + escapeHtml(comp.p) + '</strong></span>';
    html += '<span>🔗 路径: <strong style="color:#e0e0e0;">' + escapeHtml(comp.pa) + '</strong></span>';
    html += '</div>';

    // 被引用统计
    html += '<div class="fgui-stats">';
    html += '<div class="fgui-stat"><div class="num">' + refsTo.length + '</div><div class="label">谁引用了我</div></div>';
    html += '<div class="fgui-stat"><div class="num">' + refsFrom.length + '</div><div class="label">我引用了谁</div></div>';
    html += '</div>';
    html += '</div>';

    // 谁引用了我
    html += '<div class="card"><div class="card-title" style="color:#a0e8f0;">📌 谁引用了我 (' + refsTo.length + ')</div>';
    if (refsTo.length === 0) {
      html += '<div style="color:#666;padding:12px;font-size:13px;">暂无其他组件引用此资源</div>';
    } else {
      html += '<ul class="fgui-ref-list">';
      for (var i = 0; i < refsTo.length; i++) {
        var ref = refsTo[i];
        var fromComp = fguiComponents[ref.fi] || {};
        html += '<li>';
        html += '<span class="fgui-ref-id" onclick="event.stopPropagation();fguiShowDetail(\'' + ref.fi + '\')">' + escapeHtml(ref.fi) + '</span>';
        html += '<span style="color:#e0e0e0;font-size:13px;">' + escapeHtml(fromComp.n || ref.fn || '') + '</span>';
        html += '<span class="fgui-ref-pkg">📦 ' + escapeHtml(fromComp.p || ref.fp || '') + '</span>';
        html += '<span class="fgui-ref-type">' + escapeHtml(ref.rt) + '</span>';
        html += '</li>';
      }
      html += '</ul>';
    }
    html += '</div>';

    // 我引用了谁
    html += '<div class="card"><div class="card-title" style="color:#a0e8f0;">🔗 我引用了谁 (' + refsFrom.length + ')</div>';
    if (refsFrom.length === 0) {
      html += '<div style="color:#666;padding:12px;font-size:13px;">此资源未引用其他资源</div>';
    } else {
      html += '<ul class="fgui-ref-list">';
      for (var i = 0; i < refsFrom.length; i++) {
        var ref = refsFrom[i];
        var toComp = fguiComponents[ref.ti] || {};
        html += '<li>';
        html += '<span class="fgui-ref-id" onclick="event.stopPropagation();fguiShowDetail(\'' + ref.ti + '\')">' + escapeHtml(ref.ti) + '</span>';
        html += '<span style="color:#e0e0e0;font-size:13px;">' + escapeHtml(toComp.n || '') + '</span>';
        html += '<span class="fgui-ref-pkg">📦 ' + escapeHtml(toComp.p || ref.tp || '') + '</span>';
        html += '<span class="fgui-ref-type">' + escapeHtml(ref.rt) + '</span>';
        html += '</li>';
      }
      html += '</ul>';
    }
    html += '</div>';

    var area = $('fguiResultArea');
    if (area) area.innerHTML = html;
  });
}

// ============================================================
// 工具函数
// ============================================================
function statusBadge(s) {
  var map = {red:['🔴必改','badge-red'], yellow:['🟡需调','badge-yellow'], green:['🟢可复用','badge-green']};
  var item = map[s] || ['⚪未知',''];
  return '<span class="badge ' + item[1] + '">' + item[0] + '</span>';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initOpBtns();
