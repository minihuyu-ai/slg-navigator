<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵动仙府 · 配置表导航器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background:#0a0e17; color:#e0e0e0; min-height:100vh; }

.header { background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding:20px 30px; border-bottom:1px solid #2a2a4a; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:22px; color:#c8a2ff; letter-spacing:2px; }
.header span { font-size:13px; color:#888; margin-left:auto; }

.main { max-width:960px; margin:0 auto; padding:24px 20px; }

.search-box { position:relative; margin-bottom:24px; }
.search-box input { width:100%; padding:14px 20px 14px 48px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:12px; color:#e0e0e0; font-size:16px; outline:none; transition:border .2s; }
.search-box input:focus { border-color:#7c5cbf; }
.search-box input::placeholder { color:#666; }
.search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:20px; color:#666; }

.quick-btns { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
.quick-btns button { padding:8px 16px; background:#1e2235; border:1px solid #3a3a5a; border-radius:8px; color:#c0c0d0; font-size:13px; cursor:pointer; transition:all .2s; }
.quick-btns button:hover { background:#2a2e45; border-color:#7c5cbf; color:#c8a2ff; }
.quick-btns button.red { border-color:#5a2a2a; }
.quick-btns button.red:hover { border-color:#a04040; color:#ff8080; }
.quick-btns button.yellow { border-color:#4a4a2a; }
.quick-btns button.yellow:hover { border-color:#a0a040; color:#ffe060; }
.quick-btns button.green { border-color:#2a4a2a; }
.quick-btns button.green:hover { border-color:#40a040; color:#80ff80; }

.tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:2px solid #2a2a4a; }
.tab { padding:10px 20px; cursor:pointer; color:#888; font-size:14px; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
.tab.active { color:#c8a2ff; border-bottom-color:#c8a2ff; }
.tab:hover { color:#c8a2ff; }

.result-area { min-height:300px; }

.card { background:#141824; border:1px solid #2a2a4a; border-radius:12px; padding:20px; margin-bottom:16px; }
.card-title { font-size:16px; color:#c8a2ff; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.card-title .badge { font-size:11px; padding:2px 8px; border-radius:4px; }
.badge-red { background:#3a1a1a; color:#ff8080; }
.badge-yellow { background:#3a3a1a; color:#ffe060; }
.badge-green { background:#1a3a1a; color:#80ff80; }

.chain-step { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #1e2235; }
.chain-step:last-child { border-bottom:none; }
.chain-icon { min-width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; }
.chain-icon.must { background:#3a1a1a; color:#ff8080; }
.chain-icon.optional { background:#1a2a3a; color:#60a0ff; }
.chain-table { font-weight:bold; color:#e0e0e0; min-width:180px; font-size:14px; }
.chain-action { color:#aaa; font-size:13px; flex:1; }
.chain-note { color:#7c5cbf; font-size:12px; margin-top:2px; }

.concept-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; }
.concept-item { background:#1a1e2e; border:1px solid #2a2a4a; border-radius:8px; padding:14px; cursor:pointer; transition:all .2s; }
.concept-item:hover { border-color:#7c5cbf; transform:translateY(-2px); }
.concept-item .name { font-size:15px; font-weight:bold; color:#e0e0e0; }
.concept-item .bottom { font-size:12px; color:#888; margin-top:4px; }

.translate-box { display:flex; gap:12px; margin-bottom:16px; }
.translate-box input { flex:1; padding:10px 14px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; font-family:monospace; outline:none; }
.translate-box input:focus { border-color:#7c5cbf; }
.translate-result { background:#1a1e2e; border-radius:8px; padding:16px; font-size:14px; line-height:1.8; }

.dep-arrow { color:#7c5cbf; margin:0 4px; }

.empty-state { text-align:center; padding:60px 20px; color:#666; }
.empty-state .icon { font-size:48px; margin-bottom:16px; }
.empty-state p { font-size:14px; line-height:1.8; }

.summary-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.summary-item { background:#1a1e2e; border-radius:8px; padding:10px 16px; font-size:13px; }
.summary-item .num { font-size:20px; font-weight:bold; color:#c8a2ff; }
.summary-item .label { color:#888; margin-top:2px; }

.map-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #1e2235; font-size:14px; }
.map-row:last-child { border-bottom:none; }
.map-old { color:#ff8080; min-width:80px; }
.map-arrow { color:#7c5cbf; }
.map-new { color:#80ff80; min-width:80px; }

/* 文案搜索替换样式 */
.search-replace-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.search-replace-bar input { flex:1; min-width:120px; padding:10px 14px; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; }
.search-replace-bar input:focus { border-color:#7c5cbf; }
.search-replace-bar button { padding:10px 20px; border:none; border-radius:8px; font-size:14px; cursor:pointer; transition:all .2s; }
.sr-btn-search { background:#3a1a5a; color:#c8a2ff; }
.sr-btn-search:hover { background:#4a2a6a; }
.sr-btn-replace { background:#1a3a1a; color:#80ff80; }
.sr-btn-replace:hover { background:#2a4a2a; }
.sr-btn-export { background:#1a2a3a; color:#60a0ff; }
.sr-btn-export:hover { background:#2a3a4a; }
.sr-result-table { width:100%; border-collapse:collapse; font-size:13px; }
.sr-result-table th { text-align:left; padding:8px 10px; background:#1a1e2e; color:#c8a2ff; border-bottom:1px solid #3a3a5a; font-weight:normal; }
.sr-result-table td { padding:6px 10px; border-bottom:1px solid #1e2235; vertical-align:top; }
.sr-result-table tr:hover td { background:#1a1e2e; }
.sr-highlight { background:#5a3a1a; color:#ffe060; padding:1px 3px; border-radius:3px; }
.sr-replace-preview { background:#1a3a1a; color:#80ff80; padding:1px 3px; border-radius:3px; }
.sr-checkbox { width:16px; height:16px; cursor:pointer; accent-color:#7c5cbf; }
.sr-stats { display:flex; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
.sr-stat { font-size:13px; color:#888; }
.sr-stat strong { color:#c8a2ff; font-size:16px; }
.sr-loading { text-align:center; padding:40px; color:#888; }
.sr-loading .spinner { display:inline-block; width:24px; height:24px; border:3px solid #3a3a5a; border-top-color:#c8a2ff; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.sr-selected-bar { display:none; position:sticky; bottom:0; background:#1a1e2e; border:1px solid #3a3a5a; border-radius:12px; padding:12px 16px; margin-top:12px; }
.sr-selected-bar.active { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

@media(max-width:600px) {
  .header h1 { font-size:18px; }
  .main { padding:16px 12px; }
  .chain-step { flex-wrap:wrap; }
  .chain-table { min-width:auto; }
  .search-replace-bar { flex-direction:column; }
  .sr-result-table { font-size:11px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🔮 灵动仙府 · 配置表导航器</h1>
  <span>v1.0 · 策划端适配器</span>
</div>

<div class="main">

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="输入修仙概念(灵兽/修士)、操作(加修士/改建筑)、或表名(dinosaur/props)" autocomplete="off">
  </div>

  <div class="quick-btns" id="quickBtns">
    <!-- 动态生成 -->
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="concept">概念映射</div>
    <div class="tab" data-tab="op">操作指引</div>
    <div class="tab" data-tab="rename">文案改名</div>
    <div class="tab" data-tab="search">搜索替换</div>
    <div class="tab" data-tab="translate">资源翻译</div>
    <div class="tab" data-tab="deps">依赖查询</div>
    <div class="tab" data-tab="map">对照表</div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>选择上方标签或输入关键词开始<br>策划说修仙术语，导航器告诉你底层要改什么表</p>
    </div>
  </div>

</div>

<script>
// ============================================================
// 映射数据（与mapping.json同步）
// ============================================================
const DATA = {
  conceptMap: {
    "灵兽": { bottomTable:"dinosaur", bottomConcept:"恐龙", idField:"id", links:["dinosaurLevelUp","dinosaurHatch","dinosaurCondition","dinosaurArmyConfig","dinosaurMission","dinosaurShootLevel","DinosaurRoadCarnivorous","DinosaurRoadHerbivorous","DinosaurRoadOmnivorous","buildingData4Dinosaur","dinosaurRankShow","dinosaurBloodTransfer"], status:"red", desc:"50条恐龙→灵兽，prefabPath/imageIcon全换，type分类需重定义" },
    "修士": { bottomTable:"heroData", bottomConcept:"英雄", idField:"id", links:["heroLevelUp","heroSkillLevelUp","heroStarNew","heroEquipment","heroEvolution","heroRank","heroSelect","heroLove","heroEcho","heroEff","heroEquipmentSuit","heroComponent","heroExchange"], status:"red", desc:"132条英雄→修士，4组技能ID、品质、定位需重配" },
    "仙兽": { bottomTable:"behemoth", bottomConcept:"巨兽", idField:"id", links:["behemothGear","behemothGearLevel","behemothGearTier","behemothAffix","behemothAffixPool","behemothAffixSet","behegamelevel","behegamemonster","behegameprobability","behegameattribute","behegamebuff","behegameevent","behegamegrid","behegamelayer"], status:"red", desc:"巨兽→仙兽全套玩法，含巨兽游戏子玩法" },
    "兵种": { bottomTable:"soldier", bottomConcept:"兵种", idField:"id", links:["soldierCardLevelUp","soliderTeam","slgFightSoldierData","armyPreSet","armyActivityInfo","armyActivitySoldier"], status:"red", desc:"115条兵种，形象资源需替换，已部分换皮(道兵)" },
    "建筑": { bottomTable:"building", bottomConcept:"建筑", idField:"buildType", links:["buildingData","buildingIcon","buildingData4Dinosaur","buildingQuantumStage","aliBuildingCost","disappearBuildingData"], status:"yellow", desc:"building表已有换皮对照(Sheet3)，buildingData 1777行待处理" },
    "功法": { bottomTable:"research", bottomConcept:"科技", idField:"researchID", links:["researchForm","researchPos"], status:"yellow", desc:"1373行科技数据，科技名科幻→修仙" },
    "灵术": { bottomTable:"allianceTechnology", bottomConcept:"联盟科技", idField:"researchId", links:["allianceTechnologyForm"], status:"green", desc:"424行已部分换皮，字段名已用灵术/仙术" },

    "龙": { bottomTable:"dragon", bottomConcept:"龙", idField:"id", links:["dragonLevel","dragonlevelup","dragonskill","dragonskillcontrol","dragonTreasure"], status:"yellow", desc:"龙系统可能不需要换皮，修仙也有龙" },

    "奖励包": { bottomTable:"dropBag", bottomConcept:"掉落包", idField:"id", links:["dropRandom","dropProps","dropLotteryRandom"], status:"green", desc:"2579行奖励配置，机制可复用" }
  },

  resourceMap: {
    "1":{xiu:"灵石",old:"石料"},"2":{xiu:"灵谷",old:"粮食"},"3":{xiu:"灵木",old:"木材"},
    "4":{xiu:"玄铁",old:"铁矿"},"5":{xiu:"灵银",old:"银币"},"6":{xiu:"仙玉",old:"金币"}
  },

  buildingMap: {
    "城堡":"主堡","学塔":"科研所","城墙":"护山大阵","医院":"丹房","兵营":"道兵营",
    "集市":"坊市","仓库":"储物阁","酒馆":"仙缘阁","码头":"灵舟渡","巨兽堡垒":"仙兽阁"
  },

  renameGuide: {

    categories: {
      "灵兽/恐龙名": {
        tables: [

const $ = id => document.getElementById(id);

function statusBadge(s) {
  const map = {red:['🔴必改','badge-red'], yellow:['🟡需调','badge-yellow'], green:['🟢可复用','badge-green']};
  const [text,cls] = map[s] || ['⚪未知',''];
  return `<span class="badge ${cls}">${text}</span>`;
}

function renderConceptList() {
  let html = '<div class="concept-grid">';
  for (const [name, info] of Object.entries(DATA.conceptMap)) {
    html += `<div class="concept-item" onclick="showConcept('${name}')">
      <div class="name">${name} ${statusBadge(info.status)}</div>
      <div class="bottom">→ ${info.bottomTable}(${info.bottomConcept}) · ${info.links.length}张关联表</div>
    </div>`;
  }
  html += '</div>';
  $('resultArea').innerHTML = html;
}

function showConcept(name) {
  const info = DATA.conceptMap[name];
  if (!info) return;
  
  let mustCount = 0, optCount = 0;
  // 查找涉及的操作
  let relatedOps = [];
  for (const [opName, opInfo] of Object.entries(DATA.operations)) {
    for (const step of opInfo.steps) {
      if (step.table === info.bottomTable || info.links.includes(step.table)) {
        relatedOps.push(opName);
        break;
      }
    }
  }

  let html = `
    <div class="card">
      <div class="card-title">${name} ${statusBadge(info.status)}</div>
      <div class="summary-bar">
        <div class="summary-item"><div class="num">${info.bottomTable}</div><div class="label">底层表名</div></div>
        <div class="summary-item"><div class="num">${info.bottomConcept}</div><div class="label">底层概念</div></div>
        <div class="summary-item"><div class="num">${info.idField}</div><div class="label">核心ID字段</div></div>
        <div class="summary-item"><div class="num">${info.links.length}</div><div class="label">关联表数</div></div>
      </div>
      <div style="color:#aaa;font-size:13px;margin-top:8px;">${info.desc}</div>
    </div>
    <div class="card">
      <div class="card-title">🔗 关联表链路（策划说"${name}"，底层要碰这些表）</div>`;
  
  for (let i = 0; i < info.links.length; i++) {
    html += `<div class="chain-step">
      <div class="chain-icon optional">${i+1}</div>
      <div class="chain-table">${info.links[i]}</div>
      <div class="chain-action">关联表</div>
    </div>`;
  }
  html += '</div>';

  if (relatedOps.length > 0) {
    html += `<div class="card">
      <div class="card-title">📌 涉及的操作场景（点击查看完整链路）</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">`;
    for (const op of relatedOps) {
      html += `<button class="quick-btn" style="padding:8px 16px;background:#1e2235;border:1px solid #3a3a5a;border-radius:8px;color:#c0c0d0;cursor:pointer;" onclick="showOperation('${op}')">${op}</button>`;
    }
    html += '</div></div>';
  }

  $('resultArea').innerHTML = html;
}

function showOperation(opName) {
  const opInfo = DATA.operations[opName];
  if (!opInfo) return;
  
  const mustSteps = opInfo.steps.filter(s => s.must);
  const optSteps = opInfo.steps.filter(s => !s.must);
  
  let html = `
    <div class="card">
      <div class="card-title">${opName}</div>
      <div style="color:#aaa;font-size:14px;">${opInfo.desc}</div>
      <div class="summary-bar" style="margin-top:12px;">
        <div class="summary-item"><div class="num" style="color:#ff8080;">${mustSteps.length}</div><div class="label">必改表</div></div>
        <div class="summary-item"><div class="num" style="color:#60a0ff;">${optSteps.length}</div><div class="label">选改表</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🔴 必改表（不填就跑不通）</div>`;
  
  for (let i = 0; i < mustSteps.length; i++) {
    const s = mustSteps[i];
    html += `<div class="chain-step">
      <div class="chain-icon must">${i+1}</div>
      <div class="chain-table">${s.table}</div>
      <div class="chain-action">${s.action}${s.note ? `<div class="chain-note">💡 ${s.note}</div>` : ''}</div>

  if (optSteps.length > 0) {
    html += `<div class="card">
      <div class="card-title">⚪ 选改表（按需配置）</div>`;
    for (let i = 0; i < optSteps.length; i++) {

  $('resultArea').innerHTML = html;

function doTranslate() {
  const val = $('translateInput').value.trim();
  if (!val) { $('translateResult').innerHTML = '<span style="color:#888;">在上方输入框粘贴配置表中的引用值</span>'; return; }
  
  let results = [];
  for (const part of val.split('|')) {
    const p = part.trim().split(';');
    if (p.length < 3) { results.push(`<span style="color:#ff8080;">❌ "${part}" 格式不符(需3段;分隔)</span>`); continue; }
    const typeId = p[0].trim(), subType = p[1].trim(), amount = p[2].trim();
    const resInfo = DATA.resourceMap[typeId];
    if (resInfo) {
      results.push(`<span style="color:#80ff80;">✅ ${amount}<strong>${resInfo.xiu}</strong></span> <span style="color:#666;">(底层: ${amount}${resInfo.old}, ID=${typeId})</span>`);
    } else if (parseInt(typeId) > 6) {
      results.push(`<span style="color:#ffe060;">⚠️ 类型ID=${typeId} 不在资源表中，可能是道具ID，需查props表确认</span> <span style="color:#666;">数量=${amount}</span>`);
    } else {
      results.push(`<span style="color:#ff8080;">❓ 类型ID=${typeId} 未识别</span> <span style="color:#666;">数量=${amount}</span>`);
    }
  }
  $('translateResult').innerHTML = results.join('<br>');
}

  // 收集所有表名
  const allTables = new Set();
  for (const info of Object.values(DATA.conceptMap)) {

  for (const opInfo of Object.values(DATA.operations)) {

function showDeps() {
  const tableName = $('depSelect').value;
  if (!tableName) { $('depResult').innerHTML = ''; return; }
  
  // 查找哪些概念引用了这张表
  let referencedBy = [];
  for (const [concept, info] of Object.entries(DATA.conceptMap)) {
    if (info.bottomTable === tableName || info.links.includes(tableName)) {
      referencedBy.push({concept, table:info.bottomTable, isCore: info.bottomTable === tableName});
    }
  }
  
  // 查找哪些操作引用了这张表
  let opRefs = [];
  for (const [opName, opInfo] of Object.entries(DATA.operations)) {
    for (const step of opInfo.steps) {
      if (step.table === tableName) {
        opRefs.push({op:opName, action:step.action, must:step.must});
      }
    }
  }
  
  let html = '';
  if (referencedBy.length > 0) {
    html += `<div class="card"><div class="card-title">📌 被以下概念引用</div>`;
    for (const ref of referencedBy) {
      const tag = ref.isCore ? '🔴核心表' : '⚪关联表';
      html += `<div class="chain-step">
        <div class="chain-icon ${ref.isCore?'must':'optional'}">${ref.isCore?'★':'→'}</div>
        <div class="chain-table">${ref.concept}</div>
        <div class="chain-action">底层表: ${ref.table} ${tag}</div>
      </div>`;
    }
    html += '</div>';
  }
  
  if (opRefs.length > 0) {
    html += `<div class="card"><div class="card-title">⚠️ 出现在以下操作中</div>`;
    for (const ref of opRefs) {
      html += `<div class="chain-step">
        <div class="chain-icon ${ref.must?'must':'optional'}">${ref.must?'必':'选'}</div>
        <div class="chain-table" style="cursor:pointer;color:#c8a2ff;" onclick="showOperation('${ref.op}')">${ref.op}</div>
        <div class="chain-action">${ref.action}</div>
      </div>`;
    }
    html += '</div>';
  }
  
  if (!referencedBy.length && !opRefs.length) {
    html = '<div class="card" style="text-align:center;color:#888;padding:40px;">该表暂未被记录在映射关系中</div>';
  }
  
  $('depResult').innerHTML = html;
}

$('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { tabRenders[currentTab](); return; }
  
  // 搜索概念
  for (const [name, info] of Object.entries(DATA.conceptMap)) {
    if (name.includes(q) || info.bottomTable.toLowerCase().includes(q) || info.bottomConcept.includes(q)) {
      showConcept(name);
      return;
    }
  }
  
  // 搜索操作
  for (const [opName, opInfo] of Object.entries(DATA.operations)) {
    if (opName.includes(q) || opInfo.desc.includes(q)) {
      showOperation(opName);
      return;
    }
  }
  
  // 搜索改名类别
  for (const catName of Object.keys(DATA.renameGuide.categories)) {
    if (catName.includes(q)) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="rename"]').classList.add('active');
      currentTab = 'rename';
      renderRename();
      // 滚动到对应卡片
      setTimeout(() => {
        const cards = document.querySelectorAll('.card');
        for (const card of cards) {
          if (card.textContent.includes(catName)) {
            card.scrollIntoView({behavior:'smooth', block:'center'});
            card.style.boxShadow = '0 0 0 2px #c8a2ff';
            setTimeout(() => card.style.boxShadow = '', 3000);
            break;
          }
        }
      }, 100);
      return;
    }
  }
  
  // 搜索表名
  for (const [name, info] of Object.entries(DATA.conceptMap)) {
    if (info.bottomTable.toLowerCase().includes(q)) {
      showConcept(name);
      return;
    }
    for (const link of info.links) {
      if (link.toLowerCase().includes(q)) {
        showConcept(name);
        return;
      }
    }
  }
});

function loadTextData(callback) {
  if (textData) { callback(); return; }
  $('resultArea').innerHTML = '<div class="sr-loading"><div class="spinner"></div><br>正在加载文本索引...</div>';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'text_search_data.json', true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try { textData = JSON.parse(xhr.responseText); } catch(e) { textData = {}; }
    } else {
      textData = {};
    }
    callback();
  };
  xhr.onerror = function() { textData = {}; callback(); };
  xhr.send();
}

      <div class="search-replace-bar">
        <input id="srKeyword" type="text" placeholder='搜索关键词，如"冥渊冰蟒""水龙"' onkeydown="if(event.key==='Enter')doSearch()">
        <button class="sr-btn-search" onclick="doSearch()">🔍 搜索</button>
      </div>
      <div class="search-replace-bar">
        <input id="srReplace" type="text" placeholder='替换为（如"九幽玄鸟"）' oninput="srReplaceText=this.value;previewReplace()">
        <button class="sr-btn-replace" onclick="doReplacePreview()">👁 预览替换</button>
        <button class="sr-btn-export" onclick="exportReplacePlan()">📋 导出替换方案</button>
      </div>
    </div>
    <div id="srResultArea">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>输入关键词搜索所有配置表的文本内容<br>支持灵兽名、建筑名、道具描述、技能描述等</p>
      </div>
    </div>
    <div id="srSelectedBar" class="sr-selected-bar">
      <span style="color:#c8a2ff;">已选 <strong id="srSelCount">0</strong> 项</span>
      <button class="sr-btn-replace" onclick="doReplacePreview()" style="padding:6px 14px;font-size:13px;">预览替换</button>
      <button class="sr-btn-export" onclick="exportReplacePlan()" style="padding:6px 14px;font-size:13px;">导出方案</button>
    </div>`;
}

function doSearch() {
  var keyword = $('srKeyword').value.trim();
  if (!keyword) return;
  
  loadTextData(function() {
    srResults = [];
    srSelected = {};
    
    // 搜索所有表
    for (var table in textData) {
      var entries = textData[table];
      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i];
        for (var field in entry.f) {
          var val = entry.f[field];
          if (val.indexOf(keyword) !== -1) {
            srResults.push({
              table: table,
              id: entry.i,
              row: entry.r,
              sheet: entry.s,
              field: field,
              original: val
            });
          }
        }
      }
    }
    
    // 按表分组统计
    var tableGroups = {};
    for (var i = 0; i < srResults.length; i++) {
      var t = srResults[i].table;
      if (!tableGroups[t]) tableGroups[t] = 0;
      tableGroups[t]++;
    }
    
    var html = '<div class="card">';
    html += '<div class="sr-stats">';
    html += '<div class="sr-stat">找到 <strong>' + srResults.length + '</strong> 处匹配</div>';
    html += '<div class="sr-stat">涉及 <strong>' + Object.keys(tableGroups).length + '</strong> 张表</div>';
    var tableList = [];
    for (var t in tableGroups) {
      tableList.push((TABLE_CN[t]||t) + '(' + tableGroups[t] + ')');
    }
    html += '<div class="sr-stat" style="flex-basis:100%;">分布: ' + tableList.join('、') + '</div>';
    html += '</div>';
    html += '</div>';
    
    // 结果表格
    html += '<div class="card" style="overflow-x:auto;">';
    html += '<table class="sr-result-table">';
    html += '<tr><th><input type="checkbox" class="sr-checkbox" onchange="toggleAll(this.checked)"></th><th>表</th><th>ID</th><th>字段</th><th>原文</th></tr>';
    
    for (var i = 0; i < srResults.length; i++) {
      var r = srResults[i];
      var key = r.table + '|' + r.id + '|' + r.field;
      srSelected[key] = true;  // 默认全选
      
      // 高亮关键词
      var highlighted = escapeHtml(r.original);
      var kwEsc = escapeHtml(keyword);
      var regex = new RegExp('(' + kwEsc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      highlighted = highlighted.replace(regex, '<span class="sr-highlight">$1</span>');
      
      html += '<tr>';
      html += '<td><input type="checkbox" class="sr-checkbox" data-key="' + key + '" checked onchange="toggleItem(\'' + key + '\',this.checked)"></td>';
      html += '<td style="white-space:nowrap;"><strong>' + (TABLE_CN[r.table]||r.table) + '</strong><br><span style="color:#666;font-size:11px;">' + r.table + '.xlsx</span></td>';
      html += '<td>' + escapeHtml(r.id) + '</td>';
      html += '<td style="color:#c8a2ff;">' + escapeHtml(r.field) + '</td>';
      html += '<td style="max-width:400px;word-break:break-all;">' + highlighted + '</td>';
      html += '</tr>';
    }
    html += '</table></div>';
    
    $('srResultArea').innerHTML = html;
    updateSelCount();
  });
}

function toggleAll(checked) {
  for (var key in srSelected) srSelected[key] = checked;
  var cbs = document.querySelectorAll('.sr-checkbox[data-key]');
  for (var i = 0; i < cbs.length; i++) cbs[i].checked = checked;
  updateSelCount();
}

function toggleItem(key, checked) {
  srSelected[key] = checked;
  updateSelCount();
}

function updateSelCount() {
  var count = 0;
  for (var key in srSelected) { if (srSelected[key]) count++; }
  var el = $('srSelCount');
  if (el) el.textContent = count;
  var bar = $('srSelectedBar');
  if (bar) bar.className = 'sr-selected-bar' + (count > 0 ? ' active' : '');
}

function previewReplace() {
  // 只更新预览，不弹窗
}

function doReplacePreview() {
  srReplaceText = $('srReplace') ? $('srReplace').value.trim() : '';
  if (!srReplaceText) { alert('请先输入替换文本'); return; }
  
  var keyword = $('srKeyword').value.trim();
  if (!keyword) return;
  
  var selectedResults = [];
  for (var i = 0; i < srResults.length; i++) {
    var r = srResults[i];
    var key = r.table + '|' + r.id + '|' + r.field;
    if (srSelected[key]) selectedResults.push(r);
  }
  
  if (selectedResults.length === 0) { alert('请至少勾选一项'); return; }
  
  var html = '<div class="card">';
  html += '<div class="card-title">👁 替换预览</div>';
  html += '<div class="sr-stats"><div class="sr-stat">将 <strong>"' + escapeHtml(keyword) + '"</strong> 替换为 <strong>"' + escapeHtml(srReplaceText) + '"</strong></div>';
  html += '<div class="sr-stat">共 <strong>' + selectedResults.length + '</strong> 处</div></div>';
  html += '</div>';
  
  html += '<div class="card" style="overflow-x:auto;">';
  html += '<table class="sr-result-table">';
  html += '<tr><th>表</th><th>ID</th><th>字段</th><th>原文 → 替换后</th></tr>';
  
  for (var i = 0; i < selectedResults.length; i++) {
    var r = selectedResults[i];
    var newVal = r.original.split(keyword).join(srReplaceText);
    
    html += '<tr>';
    html += '<td style="white-space:nowrap;"><strong>' + (TABLE_CN[r.table]||r.table) + '</strong></td>';
    html += '<td>' + escapeHtml(r.id) + '</td>';
    html += '<td style="color:#c8a2ff;">' + escapeHtml(r.field) + '</td>';
    html += '<td style="max-width:500px;word-break:break-all;">';
    html += '<span class="sr-highlight">' + escapeHtml(keyword) + '</span>';
    html += ' → ';
    html += '<span class="sr-replace-preview">' + escapeHtml(srReplaceText) + '</span>';
    html += '<br><span style="color:#666;font-size:12px;">替换后: ' + escapeHtml(newVal) + '</span>';
    html += '</td></tr>';
  }
  html += '</table></div>';
  
  $('srResultArea').innerHTML = html;
}

function exportReplacePlan() {
  srReplaceText = $('srReplace') ? $('srReplace').value.trim() : '';
  var keyword = $('srKeyword') ? $('srKeyword').value.trim() : '';
  if (!keyword) { alert('请先搜索关键词'); return; }
  if (!srReplaceText) { alert('请先输入替换文本'); return; }
  
  var selectedResults = [];
  for (var i = 0; i < srResults.length; i++) {
    var r = srResults[i];
    var key = r.table + '|' + r.id + '|' + r.field;
    if (srSelected[key]) selectedResults.push(r);
  }
  
  if (selectedResults.length === 0) { alert('请至少勾选一项'); return; }
  
  // 生成替换方案文本
  var lines = [];
  lines.push('# 文案替换方案');
  lines.push('生成时间: ' + new Date().toLocaleString());
  lines.push('');
  lines.push('## 替换规则');
  lines.push('关键词: "' + keyword + '"');
  lines.push('替换为: "' + srReplaceText + '"');
  lines.push('');
  lines.push('## 涉及的表和字段');
  
  // 按表分组
  var groups = {};
  for (var i = 0; i < selectedResults.length; i++) {
    var r = selectedResults[i];
    if (!groups[r.table]) groups[r.table] = [];
    groups[r.table].push(r);
  }
  
  for (var table in groups) {
    lines.push('');
    lines.push('### ' + table + '.xlsx (' + (TABLE_CN[table]||'') + ')');
    lines.push('');
    var items = groups[table];
    for (var i = 0; i < items.length; i++) {
      var r = items[i];
      var newVal = r.original.split(keyword).join(srReplaceText);
      lines.push('| ID=' + r.id + ' | 行=' + r.row + ' | Sheet=' + r.sheet + ' | 字段=' + r.field + ' |');
      lines.push('| 原文: ' + r.original + ' |');
      lines.push('| 替换: ' + newVal + ' |');
      lines.push('');
    }
  }
  
  lines.push('---');
  lines.push('共 ' + selectedResults.length + ' 处替换，涉及 ' + Object.keys(groups).length + ' 张表');
  lines.push('');
  lines.push('## 操作步骤');
  lines.push('1. 在SVN中checkout对应的xlsx文件');
  lines.push('2. 按上述方案逐项修改');
  lines.push('3. 修改完成后commit到SVN');
  lines.push('4. 通知程序打表验证');
  
  var text = lines.join('\n');
  
  // 下载为文件
  var blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '替换方案_' + keyword + '_→_' + srReplaceText + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    {label:'加灵兽', op:'加灵兽', cls:'red'},

    {label:'改掌门天赋', op:'改掌门天赋', cls:'red'},
  ];

  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = b.cls;
    btn.textContent = b.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

}
